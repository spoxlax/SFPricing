<template>
    <lightning-card title="Pricing Manager">
        <div class="slds-p-around_medium slds-grid slds-wrap slds-gutters">
            <div class="slds-col slds-size_1-of-1 slds-large-size_5-of-12">
                <lightning-datatable
                    key-field="id"
                    data={profiles}
                    columns={profileColumns}
                    onrowselection={handleProfileSelection}>
                </lightning-datatable>
            </div>
            <div class="slds-col slds-size_1-of-1 slds-large-size_7-of-12">
                <lightning-input
                    type="search"
                    label="Search products"
                    value={searchTerm}
                    onchange={handleSearchChange}>
                </lightning-input>
                <div class="slds-m-top_small">
                    <lightning-datatable
                        key-field="id"
                        data={filteredProducts}
                        columns={productColumns}
                        selected-rows={selectedProductIds}
                        draft-values={draftValues}
                        onrowselection={handleProductSelection}
                        oncellchange={handleDraftChange}
                        hide-checkbox-column={false}>
                    </lightning-datatable>
                </div>
                <div class="slds-m-top_small slds-grid slds-gutters">
                    <div class="slds-col">
                        <lightning-button
                            variant="brand-outline"
                            label="Apply Inline Edits"
                            onclick={handleSaveDrafts}>
                        </lightning-button>
                    </div>
                    <div class="slds-col">
                        <lightning-button
                            variant="brand"
                            label="Save Pricing Summary"
                            onclick={handleSaveSummary}
                            disabled={disableSaveSummary}>
                        </lightning-button>
                    </div>
                </div>
            </div>
        </div>
        <template if:true={summaryText}>
            <div class="slds-p-horizontal_medium slds-p-bottom_medium">
                <lightning-formatted-text value={summaryText}></lightning-formatted-text>
            </div>
        </template>
    </lightning-card>
</template>
