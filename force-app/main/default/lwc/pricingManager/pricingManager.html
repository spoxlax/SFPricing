<template>
    <div class="bg-white min-h-screen p-6" onclick={handleGlobalClick}>

        <!-- Summary View -->
        <template lwc:if={showSummary}>
            <div class="max-w-6xl mx-auto">
                <div class="mb-8">
                    <div class="flex justify-between items-start">
                        <div>
                            <h1 class="text-3xl font-bold text-gray-900 mb-2">Pricing Summary</h1>
                            <p class="text-gray-600">
                                Summary of selected products and pricing from {selectedProfileCount} profiles
                            </p>
                            <p class="text-sm text-gray-500 mt-1">
                                Saved on {savedAt}
                            </p>
                        </div>
                        <button onclick={handleBackToProfiles} class="btn btn-secondary">
                            <lightning-icon icon-name="utility:back" size="x-small" class="mr-2"></lightning-icon>
                            Back to Profiles
                        </button>
                    </div>
                </div>

                <div class="grid grid-cols-1 gap-6 mb-8">
                    <div class="bg-blue-50 p-6 rounded-lg">
                        <div class="flex items-center">
                            <div class="w-10 h-10 bg-blue-100 rounded-lg flex items-center justify-center mr-3">
                                <lightning-icon icon-name="utility:box" size="small" variant="brand"></lightning-icon>
                            </div>
                            <div>
                                <p class="text-sm text-gray-600">Total Products</p>
                                <p class="text-2xl font-bold text-gray-900">{totalSummaryProducts}</p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-lg shadow-sm border border-gray-200">
                    <div class="p-6 border-b border-gray-200">
                        <h2 class="text-xl font-semibold text-gray-900">Profile Breakdown</h2>
                    </div>
                    <div class="p-6 space-y-6">
                        <template for:each={summaryGroupedProducts} for:item="group">
                            <div key={group.profileId} class="border border-gray-200 rounded-lg overflow-hidden">
                                <div class="bg-gray-50 p-4">
                                    <div class="flex items-center">
                                        <div class="profile-dot" style={group.dotStyle}></div>
                                        <h3 class="font-semibold text-gray-900">{group.profileName}</h3>
                                        <span class="ml-3 text-sm text-gray-500">
                                            ({group.count} products)
                                        </span>
                                    </div>
                                </div>
                                <div class="p-4">
                                    <div class="overflow-x-auto">
                                        <table class="custom-table">
                                            <thead>
                                                <tr>
                                                    <th>Product</th>
                                                    <th>Supplier Details</th>
                                                    <th>Category</th>
                                                    <th class="text-right">Discount</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                <template for:each={group.products} for:item="prod">
                                                    <tr key={prod.id}>
                                                        <td>
                                                            <div>
                                                                <p class="font-medium text-gray-900">{prod.name}</p>
                                                                <p class="text-sm text-gray-500 mt-1">{prod.description}
                                                                </p>
                                                            </div>
                                                        </td>
                                                        <td>
                                                            <div class="space-y-1">
                                                                <div class="flex items-center space-x-2">
                                                                    <span
                                                                        class="badge badge-blue">{prod.supplierCountry}</span>
                                                                    <span
                                                                        class="badge badge-green">{prod.supplier}</span>
                                                                </div>
                                                                <div class="flex items-center space-x-2">
                                                                    <span
                                                                        class="badge badge-purple">{prod.station}</span>
                                                                    <span
                                                                        class="badge badge-orange">{prod.stationGroup}</span>
                                                                </div>
                                                            </div>
                                                        </td>
                                                        <td>
                                                            <span class="badge badge-gray">{prod.category}</span>
                                                        </td>
                                                        <td class="text-right">
                                                            <span class="badge badge-orange">{prod.discount}%</span>
                                                        </td>
                                                    </tr>
                                                </template>
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </div>
        </template>

        <!-- Main View -->
        <template lwc:else>
            <div class="mb-8">
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <h1 class="text-3xl font-bold text-gray-900 mb-2">Profile Management</h1>
                        <p class="text-gray-600">Select multiple profiles to view grouped products</p>
                    </div>
                </div>
            </div>

            <div class="main-grid">
                <!-- Profile Selector -->
                <div class="col-span-1">
                    <div class="bg-gray-50 rounded-lg p-6 h-fit">
                        <div class="mb-4">
                            <h2 class="text-lg font-bold text-gray-900 mb-4">Select Profile</h2>
                            <div class="relative">
                                <lightning-icon icon-name="utility:search" size="x-small"
                                    class="absolute left-3 top-3 text-gray-400"></lightning-icon>
                                <input type="text" class="input-field pl-10" placeholder="Search profiles..."
                                    value={profileSearchTerm} oninput={handleProfileSearch}>
                            </div>
                        </div>

                        <div class="space-y-4 max-h-96 overflow-y-auto">
                            <template for:each={visibleProfiles} for:item="profile">
                                <div key={profile.id} class={profile.containerClass} data-id={profile.id}
                                    onclick={handleProfileSelect}>
                                    <div class="flex items-center justify-between mb-2">
                                        <div class="flex items-center">
                                            <div class="profile-dot" style={profile.dotStyle}></div>
                                            <h3 class="font-medium text-gray-900">{profile.name}</h3>
                                        </div>
                                        <template lwc:if={profile.isSelected}>
                                            <lightning-icon icon-name="utility:check" size="x-small"
                                                variant="brand"></lightning-icon>
                                        </template>
                                    </div>
                                    <p class="text-sm text-gray-500 mb-3">{profile.description}</p>

                                    <!-- Badges -->
                                    <div class="flex flex-wrap mb-3">
                                        <template for:each={profile.tags} for:item="tag">
                                            <span key={tag.label} class={tag.class}>{tag.label}</span>
                                        </template>
                                    </div>

                                    <div class="flex items-center text-xs text-gray-500">
                                        <lightning-icon icon-name="utility:box" size="xx-small"
                                            class="mr-1"></lightning-icon>
                                        <span>{profile.productCount} products</span>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>

                <!-- Product Manager -->
                <div class="col-span-2">
                    <template lwc:if={hasProfilesSelected}>
                        <div class="flex justify-between items-center mb-6">
                            <h2 class="text-xl font-bold text-gray-900">
                                Products ({selectedProductCount} selected)
                            </h2>
                            <div class="flex space-x-2">
                                <button onclick={handleAddProduct} class="btn btn-secondary mr-2">
                                    <lightning-icon icon-name="utility:add" size="x-small"
                                        class="mr-2"></lightning-icon>
                                    Add Product
                                </button>
                                <button onclick={handleSaveSummary} class="btn btn-primary" disabled={isSaveDisabled}>
                                    Save Summary
                                </button>
                            </div>
                        </div>

                        <!-- Filters -->
                        <div
                            class="flex flex-col md:flex-row justify-between items-center gap-4 mb-6 bg-gray-50 p-4 rounded-lg">
                            <div class="w-full md:w-64 relative">
                                <lightning-icon icon-name="utility:search" size="x-small"
                                    class="absolute left-3 top-3 text-gray-400"></lightning-icon>
                                <input type="text" class="input-field pl-10" placeholder="Search products..."
                                    value={searchTerm} oninput={handleSearchChange}>
                            </div>
                            <div class="flex gap-4 w-full md:w-auto">
                                <select class="input-field w-full md:w-48" onchange={handleCategoryChange}>
                                    <option value="all">All Categories</option>
                                    <template for:each={categories} for:item="cat">
                                        <option key={cat} value={cat}>{cat}</option>
                                    </template>
                                </select>
                                <select class="input-field w-full md:w-48" onchange={handleSortChange}>
                                    <option value="name">Name (A-Z)</option>
                                    <option value="price">Price (High-Low)</option>
                                    <option value="discount">Discount (High-Low)</option>
                                    <option value="category">Category</option>
                                </select>
                            </div>
                        </div>

                        <!-- Product List -->
                        <div class="space-y-8">
                            <template for:each={groupedProducts} for:item="group">
                                <div key={group.profileId} class="border border-gray-200 rounded-lg overflow-hidden">
                                    <!-- Profile Header -->
                                    <div class="bg-gray-50 p-4 border-b border-gray-200 cursor-pointer flex justify-between items-center"
                                        data-id={group.profileId} onclick={toggleProfileExpansion}>
                                        <div class="flex items-center">
                                            <lightning-icon icon-name={group.expandIcon} size="x-small"
                                                class="mr-2"></lightning-icon>
                                            <div class="profile-dot" style={group.dotStyle}></div>
                                            <h3 class="font-semibold text-gray-900 text-lg">{group.profileName}</h3>
                                            <span class="ml-3 text-sm text-gray-500">
                                                ({group.selectedCount}/{group.totalCount} selected)
                                            </span>
                                        </div>
                                        <div class="flex items-center space-x-2">
                                            <button class="text-sm text-blue-600 hover:text-blue-800"
                                                data-id={group.profileId} onclick={handleSelectAllProfile}>
                                                {group.selectAllLabel}
                                            </button>
                                        </div>
                                    </div>

                                    <!-- Categories -->
                                    <template lwc:if={group.isExpanded}>
                                        <div class="p-4 bg-white">
                                            <template for:each={group.categories} for:item="catGroup">
                                                <div key={catGroup.key} class="mb-6 last:mb-0">
                                                    <!-- Category Header -->
                                                    <div class="flex items-center mb-3 cursor-pointer"
                                                        data-key={catGroup.key} onclick={toggleCategoryExpansion}>
                                                        <lightning-icon icon-name={catGroup.expandIcon} size="x-small"
                                                            class="mr-2"></lightning-icon>
                                                        <h4 class="font-medium text-gray-700">{catGroup.name}</h4>
                                                        <span
                                                            class="ml-2 text-xs text-gray-500">({catGroup.count})</span>
                                                    </div>

                                                    <!-- Product Table -->
                                                    <template lwc:if={catGroup.isExpanded}>
                                                        <div class="overflow-x-auto border rounded-lg">
                                                            <table class="custom-table">
                                                                <thead>
                                                                    <tr>
                                                                        <th class="w-10">
                                                                            <input type="checkbox"
                                                                                checked={catGroup.isAllSelected}
                                                                                data-key={catGroup.key}
                                                                                onchange={handleSelectAllCategory}
                                                                                class="cursor-pointer">
                                                                        </th>
                                                                        <th class="w-32">Product ID</th>
                                                                        <th class="w-32">Supplier</th>
                                                                        <th class="w-28">Category</th>
                                                                        <th class="w-20">Curr</th>
                                                                        <th class="w-24">Discount</th>
                                                                        <th class="w-24">Surcharge</th>
                                                                        <th class="w-16 text-right">Actions</th>
                                                                    </tr>
                                                                </thead>
                                                                <tbody>
                                                                    <template for:each={catGroup.products}
                                                                        for:item="prod">
                                                                        <tr key={prod.id}>
                                                                            <td>
                                                                                <input type="checkbox"
                                                                                    checked={prod.isSelected}
                                                                                    data-id={prod.id}
                                                                                    onchange={handleProductSelect}
                                                                                    class="cursor-pointer">
                                                                            </td>
                                                                            <td>
                                                                                <div class="font-medium text-gray-900 cursor-pointer hover:text-blue-600"
                                                                                    data-id={prod.id}
                                                                                    onclick={handleViewProduct}>
                                                                                    #{prod.id}
                                                                                </div>
                                                                                <div class="text-xs text-gray-500 truncate"
                                                                                    title={prod.name}>{prod.name}</div>
                                                                            </td>
                                                                            <td>
                                                                                <div class="flex flex-col space-y-1">
                                                                                    <div class="flex space-x-1">
                                                                                        <span
                                                                                            class="badge badge-blue">{prod.supplierCountry}</span>
                                                                                        <span
                                                                                            class="badge badge-green">{prod.supplier}</span>
                                                                                    </div>
                                                                                    <div class="flex space-x-1">
                                                                                        <span
                                                                                            class="badge badge-purple truncate max-w-[80px]">{prod.station}</span>
                                                                                    </div>
                                                                                </div>
                                                                            </td>
                                                                            <td>
                                                                                <span
                                                                                    class="badge badge-gray truncate max-w-[100px]">{prod.category}</span>
                                                                            </td>
                                                                            <td>
                                                                                <span
                                                                                    class="badge badge-indigo">{prod.currency}</span>
                                                                            </td>
                                                                            <!-- Discount Editable Cell -->
                                                                            <td>
                                                                                <template
                                                                                    lwc:if={prod.isEditingDiscount}>
                                                                                    <div
                                                                                        class="flex items-center space-x-1">
                                                                                        <input type="number"
                                                                                            class="inline-edit-input"
                                                                                            value={prod.editValue}
                                                                                            data-id={prod.id}
                                                                                            data-field="discount"
                                                                                            oninput={handleEditInput}
                                                                                            onkeydown={handleEditKeyDown}
                                                                                            min="0" max="100"
                                                                                            step="0.01">
                                                                                        <button
                                                                                            class="action-btn text-green-600"
                                                                                            onclick={saveEdit}>
                                                                                            <lightning-icon
                                                                                                icon-name="utility:check"
                                                                                                size="xx-small"></lightning-icon>
                                                                                        </button>
                                                                                        <button
                                                                                            class="action-btn text-red-600"
                                                                                            onclick={cancelEdit}>
                                                                                            <lightning-icon
                                                                                                icon-name="utility:close"
                                                                                                size="xx-small"></lightning-icon>
                                                                                        </button>
                                                                                    </div>
                                                                                </template>
                                                                                <template lwc:else>
                                                                                    <div class="cursor-pointer hover:bg-gray-100 p-1 rounded group flex items-center justify-between"
                                                                                        data-id={prod.id}
                                                                                        data-field="discount"
                                                                                        onclick={startEdit}>
                                                                                        <span
                                                                                            class="badge badge-orange">{prod.discount}%</span>
                                                                                        <lightning-icon
                                                                                            icon-name="utility:edit"
                                                                                            size="xx-small"
                                                                                            class="opacity-0 group-hover:opacity-50"></lightning-icon>
                                                                                    </div>
                                                                                </template>
                                                                            </td>
                                                                            <!-- Surcharge Editable Cell -->
                                                                            <td>
                                                                                <template
                                                                                    lwc:if={prod.isEditingSurcharge}>
                                                                                    <div
                                                                                        class="flex items-center space-x-1">
                                                                                        <input type="number"
                                                                                            class="inline-edit-input"
                                                                                            value={prod.editValue}
                                                                                            data-id={prod.id}
                                                                                            data-field="surcharge"
                                                                                            oninput={handleEditInput}
                                                                                            onkeydown={handleEditKeyDown}
                                                                                            min="0" step="0.01">
                                                                                        <button
                                                                                            class="action-btn text-green-600"
                                                                                            onclick={saveEdit}>
                                                                                            <lightning-icon
                                                                                                icon-name="utility:check"
                                                                                                size="xx-small"></lightning-icon>
                                                                                        </button>
                                                                                        <button
                                                                                            class="action-btn text-red-600"
                                                                                            onclick={cancelEdit}>
                                                                                            <lightning-icon
                                                                                                icon-name="utility:close"
                                                                                                size="xx-small"></lightning-icon>
                                                                                        </button>
                                                                                    </div>
                                                                                </template>
                                                                                <template lwc:else>
                                                                                    <div class="cursor-pointer hover:bg-gray-100 p-1 rounded group flex items-center justify-between"
                                                                                        data-id={prod.id}
                                                                                        data-field="surcharge"
                                                                                        onclick={startEdit}>
                                                                                        <span
                                                                                            class="text-blue-600 font-semibold text-sm">${prod.surcharge}</span>
                                                                                        <lightning-icon
                                                                                            icon-name="utility:edit"
                                                                                            size="xx-small"
                                                                                            class="opacity-0 group-hover:opacity-50"></lightning-icon>
                                                                                    </div>
                                                                                </template>
                                                                            </td>
                                                                            <!-- Actions -->
                                                                            <td class="text-right">
                                                                                <div class="flex justify-end space-x-2">
                                                                                    <button
                                                                                        class="action-btn text-blue-600 hover:bg-blue-50"
                                                                                        data-id={prod.id}
                                                                                        onclick={handleEditProductModal}
                                                                                        title="Edit">
                                                                                        <lightning-icon
                                                                                            icon-name="utility:edit"
                                                                                            size="x-small"></lightning-icon>
                                                                                    </button>
                                                                                    <button
                                                                                        class="action-btn text-gray-600 hover:bg-gray-100"
                                                                                        data-id={prod.id}
                                                                                        onclick={handleCloneProductModal}
                                                                                        title="Clone">
                                                                                        <lightning-icon
                                                                                            icon-name="utility:copy"
                                                                                            size="x-small"></lightning-icon>
                                                                                    </button>
                                                                                    <button
                                                                                        class="action-btn text-red-600 hover:bg-red-50"
                                                                                        data-id={prod.id}
                                                                                        onclick={handleDeleteProductModal}
                                                                                        title="Delete">
                                                                                        <lightning-icon
                                                                                            icon-name="utility:delete"
                                                                                            size="x-small"></lightning-icon>
                                                                                    </button>
                                                                                </div>
                                                                            </td>
                                                                        </tr>
                                                                    </template>
                                                                </tbody>
                                                            </table>
                                                        </div>
                                                    </template>
                                                </div>
                                            </template>
                                        </div>
                                    </template>
                                </div>
                            </template>
                        </div>
                    </template>
                    <template lwc:else>
                        <div
                            class="flex flex-col items-center justify-center h-full bg-gray-50 rounded-lg p-12 text-center min-h-[400px]">
                            <div class="w-16 h-16 bg-gray-200 rounded-full flex items-center justify-center mb-4">
                                <lightning-icon icon-name="utility:box" size="medium"
                                    class="text-gray-500"></lightning-icon>
                            </div>
                            <h3 class="text-xl font-bold text-gray-900 mb-2">Select Profile</h3>
                            <p class="text-gray-500">Choose profile from the left to view its products</p>
                        </div>
                    </template>
                </div>
            </div>
        </template>

        <!-- Modals (Simplified for this step, fleshed out in JS) -->
        <!-- Product Details Modal -->
        <template lwc:if={showProductDetailsModal}>
            <div class="modal-overlay">
                <div class="modal-content">
                    <div class="p-6">
                        <div class="flex justify-between items-start mb-4">
                            <h3 class="text-xl font-bold text-gray-900">Product Details</h3>
                            <button onclick={closeModals} class="text-gray-400 hover:text-gray-500">
                                <lightning-icon icon-name="utility:close" size="small"></lightning-icon>
                            </button>
                        </div>
                        <div class="space-y-4">
                            <div>
                                <label class="text-sm font-medium text-gray-500">Product Name</label>
                                <p class="text-gray-900">{viewingProduct.name}</p>
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="text-sm font-medium text-gray-500">Price</label>
                                    <p class="text-gray-900">{viewingProduct.price} {viewingProduct.currency}</p>
                                </div>
                                <div>
                                    <label class="text-sm font-medium text-gray-500">Category</label>
                                    <p class="text-gray-900">{viewingProduct.category}</p>
                                </div>
                            </div>
                            <!-- Add more details as needed -->
                        </div>
                        <div class="mt-6 flex justify-end">
                            <button onclick={closeModals} class="btn btn-secondary">Close</button>
                        </div>
                    </div>
                </div>
            </div>
        </template>

    </div>

    <!-- Form Modal (Add/Edit/Clone) -->
    <template lwc:if={showFormModal}>
        <div class="modal-overlay">
            <div class="modal-content">
                <div class="p-6">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-xl font-bold text-gray-900">{modalTitle}</h3>
                        <button onclick={closeModal} class="text-gray-400 hover:text-gray-500">
                            <lightning-icon icon-name="utility:close" size="small"></lightning-icon>
                        </button>
                    </div>

                    <div class="space-y-4">
                        <!-- Profile Selection -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Profile</label>
                            <select class="input-field" name="profileId" onchange={handleModalChange}
                                disabled={isEditMode}>
                                <option value="">Select Profile</option>
                                <template for:each={profileOptions} for:item="opt">
                                    <option key={opt.value} value={opt.value} selected={formData.profileId===opt.value}>
                                        {opt.label}</option>
                                </template>
                            </select>
                            <template lwc:if={formErrors.profileId}>
                                <p class="text-red-600 text-xs mt-1">{formErrors.profileId}</p>
                            </template>
                        </div>

                        <!-- Product Name -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Product Name *</label>
                            <input type="text" class="input-field" name="name" value={formData.name}
                                oninput={handleModalChange} placeholder="Enter product name">
                            <template lwc:if={formErrors.name}>
                                <p class="text-red-600 text-xs mt-1">{formErrors.name}</p>
                            </template>
                        </div>

                        <!-- Supplier Info -->
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Supplier Country *</label>
                                <select class="input-field" name="supplierCountry" onchange={handleModalChange}>
                                    <option value="">Select Country</option>
                                    <template for:each={countryOptions} for:item="opt">
                                        <option key={opt.value} value={opt.value}
                                            selected={formData.supplierCountry===opt.value}>{opt.label}</option>
                                    </template>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Supplier *</label>
                                <select class="input-field" name="supplier" onchange={handleModalChange}>
                                    <option value="">Select Supplier</option>
                                    <template for:each={supplierOptions} for:item="opt">
                                        <option key={opt.value} value={opt.value}
                                            selected={formData.supplier===opt.value}>{opt.label}</option>
                                    </template>
                                </select>
                            </div>
                        </div>

                        <!-- Station Info -->
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Station *</label>
                                <select class="input-field" name="station" onchange={handleModalChange}>
                                    <option value="">Select Station</option>
                                    <template for:each={stationOptions} for:item="opt">
                                        <option key={opt.value} value={opt.value}
                                            selected={formData.station===opt.value}>{opt.label}</option>
                                    </template>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Station Group *</label>
                                <select class="input-field" name="stationGroup" onchange={handleModalChange}>
                                    <option value="">Select Group</option>
                                    <template for:each={stationGroupOptions} for:item="opt">
                                        <option key={opt.value} value={opt.value}
                                            selected={formData.stationGroup===opt.value}>{opt.label}</option>
                                    </template>
                                </select>
                            </div>
                        </div>

                        <!-- Price Model & Currency -->
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Price Model *</label>
                                <select class="input-field" name="priceModel" onchange={handleModalChange}>
                                    <option value="">Select Model</option>
                                    <template for:each={priceModelOptions} for:item="opt">
                                        <option key={opt.value} value={opt.value}
                                            selected={formData.priceModel===opt.value}>{opt.label}</option>
                                    </template>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Currency *</label>
                                <select class="input-field" name="currencyCode" onchange={handleModalChange}>
                                    <option value="">Select Currency</option>
                                    <template for:each={currencyOptions} for:item="opt">
                                        <option key={opt.value} value={opt.value}
                                            selected={formData.currencyCode===opt.value}>{opt.label}</option>
                                    </template>
                                </select>
                            </div>
                        </div>

                        <!-- Price -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Price ($) *</label>
                            <input type="number" class="input-field" name="price" value={formData.price}
                                oninput={handleModalChange} step="0.01" min="0" placeholder="0.00">
                            <template lwc:if={formErrors.price}>
                                <p class="text-red-600 text-xs mt-1">{formErrors.price}</p>
                            </template>
                        </div>

                        <!-- Discount & Surcharge -->
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Discount (%) *</label>
                                <input type="number" class="input-field" name="discount" value={formData.discount}
                                    oninput={handleModalChange} min="0" max="100" placeholder="0">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Surcharge ($)</label>
                                <input type="number" class="input-field" name="surcharge" value={formData.surcharge}
                                    oninput={handleModalChange} step="0.01" min="0" placeholder="0.00">
                            </div>
                        </div>

                        <!-- Category -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Category *</label>
                            <select class="input-field" name="category" onchange={handleModalChange}>
                                <option value="">Select Category</option>
                                <template for:each={categoryOptions} for:item="opt">
                                    <option key={opt.value} value={opt.value} selected={formData.category===opt.value}>
                                        {opt.label}</option>
                                </template>
                            </select>
                            <template lwc:if={formErrors.category}>
                                <p class="text-red-600 text-xs mt-1">{formErrors.category}</p>
                            </template>
                        </div>

                        <!-- Description -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
                            <textarea class="input-field h-24" name="description" oninput={handleModalChange}
                                placeholder="Enter product description">{formData.description}</textarea>
                        </div>
                    </div>

                    <div class="mt-6 flex justify-end space-x-3">
                        <button onclick={closeModal} class="btn btn-secondary">Cancel</button>
                        <button onclick={handleSaveProduct} class="btn btn-primary">Save Product</button>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <!-- Delete Confirmation Modal -->
    <template lwc:if={showDeleteModal}>
        <div class="modal-overlay">
            <div class="modal-content" style="max-width: 28rem;">
                <div class="p-6">
                    <div class="flex items-center justify-center w-12 h-12 rounded-full bg-red-100 mx-auto mb-4">
                        <lightning-icon icon-name="utility:warning" size="medium" variant="error"></lightning-icon>
                    </div>
                    <h3 class="text-lg font-bold text-gray-900 text-center mb-2">Delete Product</h3>
                    <p class="text-sm text-gray-500 text-center mb-6">
                        Are you sure you want to delete <span class="font-bold">{pendingDeleteProduct.name}</span>? This
                        action cannot be undone.
                    </p>
                    <div class="flex justify-center space-x-3">
                        <button onclick={cancelDelete} class="btn btn-secondary w-24">Cancel</button>
                        <button onclick={confirmDelete} class="btn btn-danger w-24">Delete</button>
                    </div>
                </div>
            </div>
        </div>
    </template>

</template>
